document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-top:2px;\">ARTIGOS RELIGIOSOS<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:14px;max-width:280px;margin:0;\">Imagens sacras de Umbanda, impressas em 3D e pintadas à mão. Peças únicas, feitas com devoção.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:#cda352;font-weight:600;margin-bottom:14px;\">Categorias<\u002Fdiv>\n        <sc-for list=\"{{ allCats }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <div onclick=\"{{ c.open }}\" style=\"font-size:14px;margin-bottom:9px;cursor:pointer;color:#b7a98d;\">{{ c.name }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:#cda352;font-weight:600;margin-bottom:14px;\">Atendimento<\u002Fdiv>\n        <a href=\"{{ whatsHref }}\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:8px;color:#f4ecdb;text-decoration:none;font-size:14px;margin-bottom:10px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.5A10 10 0 1 0 12 2z\"><\u002Fpath><\u002Fsvg>WhatsApp<\u002Fa>\n        <div style=\"font-size:14px;margin-bottom:9px;\">Pedidos e dúvidas pelo WhatsApp<\u002Fdiv>\n        <div style=\"font-size:14px;\">Seg a Sáb · 9h às 18h<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:#cda352;font-weight:600;margin-bottom:14px;\">Pagamento &amp; Frete<\u002Fdiv>\n        <div style=\"font-size:14px;margin-bottom:9px;\">Pedidos finalizados pelo WhatsApp<\u002Fdiv>\n        <div style=\"font-size:14px;margin-bottom:9px;\">Envio para todo o Brasil (Correios)<\u002Fdiv>\n        <div style=\"font-size:14px;\">Personalizamos nas suas cores<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(205,163,82,.14);\">\n s Guias']},\n      {slug:'velas',name:'Velas'},\n      {slug:'guias-colares',name:'Guias e Colares'},\n      {slug:'firmas-ferramentas',name:'Firmas e Ferramentas'},\n      {slug:'incensos',name:'Incensos'},\n      {slug:'defumadores',name:'Defumadores'},\n      {slug:'banhos-ervas',name:'Banhos e Ervas'},\n      {slug:'quartinhas',name:'Quartinhas'},\n      {slug:'pembas',name:'Pembas'},\n      {slug:'kits-orixas',name:'Kits para Orixás'},\n      {slug:'decoracao',name:'Decoração Religiosa'}\n    ];\n    this.PRODUCTS = [\n      {id:'exu-caveira',cat:'imagens',sub:'Exus',name:'Exu Caveira',tagline:'Guardião dos caminhos e dos cemitérios.',price:8990,\n       sizes:['18 cm','20 cm','22 cm','25 cm','30 cm','40 cm','50 cm'],\n       images:['assets/products/exu-caveira/1.jpeg','assets/products/exu-caveira/2.jpeg','assets/products/exu-caveira/3.jpeg','assets/products/exu-caveira/4.jpeg'],\n       note:'',obs:'',\n       desc:['A imagem representa Exu Caveira, guardião dos caminhos e dos cemitérios — símbolo de força, sabedoria e abertura de caminhos espirituais.','Produzida em PLA de alta qualidade, impressa em 3D e finalizada manualmente. Cada peça é pintada à mão, tornando-se única e exclusiva.','Ideal para quem busca proteção, firmeza e uma peça decorativa de profundo valor simbólico.'],\n       specs:[{k:'Material',v:'PLA ou PETG resistente (uso interno)'},{k:'Resistência',v:'PLA até 60°C · PETG até 80°C'},{k:'Cor',v:'Preto com detalhes em vermelho'},{k:'Acabamento',v:'Brilho e pintura artesanal'}]},\n      {id:'oxum',cat:'imagens',sub:'Orixás',name:'Oxum',tagline:'Orixá do amor, da beleza e da prosperidade.',price:7990,\n       sizes:['18 cm','20 cm','22 cm','25 cm'],\n       images:['assets/products/oxum/1.jpeg','assets/products/oxum/2.jpeg','assets/products/oxum/3.jpeg','assets/products/oxum/4.jpeg'],\n       note:'',obs:'',\n       desc:['Escultura de Oxum em posição serena, segurando seu espelho, com coroa e manto ricamente esculpidos.','Acabamento em dourado e preto brilhante, simbolizando o ouro, a feminilidade e a força espiritual desta poderosa Orixá. Ideal para altares, decoração, coleção ou presente com significado.','Oxum representa o amor, a fertilidade e as águas doces — uma energia de suavidade e poder que traz harmonia e prosperidade ao ambiente.'],\n       specs:[{k:'Material',v:'PLA'},{k:'Acabamento',v:'Pintura dourada com detalhes em preto'},{k:'Base',v:'Firme, pronta para exposição'},{k:'Produção',v:'Artesanal — cada peça é única'}]},\n      {id:'maria-padilha-almas',cat:'imagens',sub:'Pombagiras',name:'Maria Padilha das Almas',tagline:'Elegância, poder e mistério em uma obra única.',price:18990,\n       sizes:['30 cm','40 cm','50 cm','60 cm'],\n       images:['assets/products/maria-padilha-almas/1.jpeg','assets/products/maria-padilha-almas/2.jpeg','assets/products/maria-padilha-almas/3.jpeg','assets/products/maria-padilha-almas/4.jpeg','assets/products/maria-padilha-almas/5.jpeg'],\n       note:'Personalizamos com as suas cores.',obs:'',\n       desc:['Imponente, sedutora e cheia de presença — muito mais que decoração, é uma expressão de força espiritual, beleza e personalidade.','Vestida em traje vermelho com detalhes em preto, taça na mão e postura firme. O acabamento brilhante valoriza cada dobra do vestido e a expressão marcante.','Base reforçada com o nome em alto relevo. Uma peça que transmite respeito, força feminina e magnetismo.'],\n       specs:[{k:'Acabamento',v:'Premium, pintura sofisticada com brilho'},{k:'Base',v:'Reforçada, com nome em alto relevo'},{k:'Personalização',v:'Sob encomenda, nas suas cores'},{k:'Produção',v:'Artesanal, atenção aos detalhes'}]},\n      {id:'pombagira-rainha',cat:'imagens',sub:'Pombagiras',name:'Maria Padilha — Rainha das Sete Encruzilhadas',tagline:'Poder, sedução, proteção e caminhos abertos.',price:21990,\n       sizes:['30 cm','40 cm','50 cm'],\n       images:['assets/products/pombagira-rainha/1.jpeg','assets/products/pombagira-rainha/2.jpeg','assets/products/pombagira-rainha/3.jpeg','assets/products/pombagira-rainha/4.jpeg'],\n       note:'',obs:'A guia em sua mão não acompanha o produto.',\n       desc:['Maria Padilha, Rainha das Sete Encruzilhadas — força, elegância e poder para o seu lar ou espaço espiritual.','Produzida em PLA com preenchimento em gesso, garantindo excelente peso, estabilidade e acabamento superior. Pintura artesanal, cores vivas e brilho realçado.','Vestida em preto e vermelho, com coroa dourada, taça e colar em destaque — símbolo de poder, sedução, proteção e caminhos abertos.'],\n       specs:[{k:'Material',v:'PLA com preenchimento em gesso'},{k:'Acabamento',v:'Pintura manual, brilho realçado'},{k:'Indicado para',v:'Altares, casas, lojas e presentes'},{k:'Tamanho',v:'Conforme variação'}]}\n    ];\n    this.state = {theme:'escuro',screen:'home',catSlug:'imagens',sub:'Todas',prodId:null,gIndex:0,selSize:null,qty:1,menuOpen:false,cart:[],cep:'',frete:null,toast:''};\n  }\n  componentDidMount(){\n    var upd={};\n    try{\n      var t=localStorage.getItem('mrbrant_theme'); if(t&&this.themes[t]) upd.theme=t;\n      var c=localStorage.getItem('mrbrant_cart'); if(c) upd.cart=JSON.parse(c)||[];\n    }catch(e){}\n    this.applyTheme(upd.theme||this.state.theme);\n    if(Object.keys(upd).length) this.setState(upd);\n  }\n  componentDidUpdate(pp,ps){ if(ps && ps.theme!==this.state.theme) this.applyTheme(this.state.theme); }\n  applyTheme(name){\n    var el=document.getElementById('mb-root')||(this.rootRef&&this.rootRef.current); if(!el) return;\n    var v=this.themes[name]||this.themes.escuro;\n    Object.keys(v).forEach(function(k){ el.style.setProperty(k,v[k]); });\n  }\n  toTop(){ try{window.scrollTo({top:0,behavior:'auto'});}catch(e){} }\n  brl(c){ return 'R$ '+(c/100).toFixed(2).replace('.',','); }\n  bgObj(url,pos,size){ return {position:'absolute',inset:0,backgroundImage:\"url('\"+url+\"')\",backgroundSize:size||'cover',backgroundPosition:pos||'center',backgroundRepeat:'no-repeat'}; }\n  curProd(){ return this.PRODUCTS.find(function(x){return x.id===this.state.prodId;}.bind(this)); }\n  toggleTheme(){ var t=this.state.theme==='escuro'?'claro':'escuro'; var self=this; this.setState({theme:t},function(){ self.applyTheme(t); }); try{localStorage.setItem('mrbrant_theme',t);}catch(e){} }\n  goHome(){ this.setState({screen:'home',menuOpen:false}); this.toTop(); }\n  goCart(){ this.setState({screen:'cart',menuOpen:false}); this.toTop(); }\n  goContato(){ this.setState({menuOpen:false}); try{window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});}catch(e){} }\n  openCategory(slug){ this.setState({screen:'category',catSlug:slug,sub:'Todas',menuOpen:false}); this.toTop(); }\n  openSub(s){ this.setState({screen:'category',catSlug:'imagens',sub:s,menuOpen:false}); this.toTop(); }\n  openProduct(id){ var p=this.PRODUCTS.find(function(x){return x.id===id;}); if(!p) return; this.setState({screen:'product',prodId:id,gIndex:0,selSize:p.sizes[0],qty:1,frete:null,cep:'',menuOpen:false}); this.toTop(); }\n  persistCart(c){ try{localStorage.setItem('mrbrant_cart',JSON.stringify(c));}catch(e){} }\n  addToCart(){ var p=this.curProd(); if(!p) return; var size=this.state.selSize||p.sizes[0]; var qty=this.state.qty; var cart=this.state.cart.slice(); var i=cart.findIndex(function(it){return it.id===p.id&&it.size===size;}); if(i>=0){cart[i]={id:cart[i].id,size:cart[i].size,qty:cart[i].qty+qty};}else{cart.push({id:p.id,size:size,qty:qty});} this.setState({cart:cart}); this.persistCart(cart); this.showToast('Adicionado à sacola'); }\n  buyNowCurrent(){ var p=this.curProd(); if(!p) return; var size=this.state.selSize; var msg='Olá! Tenho interesse na imagem *'+p.name+'* (tamanho: '+size+'). Pode me passar valores e disponibilidade?'; window.open(this.waHref(msg),'_blank'); }\n  waHref(msg){ return 'https://wa.me/'+this.WHATS+'?text='+encodeURIComponent(msg); }\n  cartInc(i){ var c=this.state.cart.slice(); c[i]={id:c[i].id,size:c[i].size,qty:c[i].qty+1}; this.setState({cart:c}); this.persistCart(c); }\n  cartDec(i){ var c=this.state.cart.slice(); c[i]={id:c[i].id,size:c[i].size,qty:Math.max(1,c[i].qty-1)}; this.setState({cart:c}); this.persistCart(c); }\n  cartRemove(i){ var c=this.state.cart.slice(); c.splice(i,1); this.setState({cart:c}); this.persistCart(c); }\n  finalizeCart(){ var self=this; var lines=this.state.cart.map(function(it){ var p=self.PRODUCTS.find(function(x){return x.id===it.id;}); return '• '+p.name+' — '+it.size+' — '+it.qty+'x'; }).join('\\n'); var msg='Olá! Gostaria de fazer um pedido na Mr.Brant:\\n'+lines+'\\n\\nPode confirmar valores e o frete? Obrigado!'; window.open(this.waHref(msg),'_blank'); }\n  onCep(e){ var v=e.target.value.replace(/\\D/g,'').slice(0,8); if(v.length>5) v=v.slice(0,5)+'-'+v.slice(5); this.setState({cep:v}); }\n  calcFrete(){ var d=(this.state.cep||'').replace(/\\D/g,''); if(d.length<8){ this.setState({frete:{err:true}}); return; } var seed=parseInt(d.slice(0,3),10)||100; var pac=1990+(seed%26)*50; var sedex=pac+1700+(seed%10)*40; this.setState({frete:{ok:true,pac:this.brl(pac),sedex:this.brl(sedex)}}); }\n  showToast(m){ this.setState({toast:m}); clearTimeout(this._t); var self=this; this._t=setTimeout(function(){ self.setState({toast:''}); },2200); }\n  card(p){ var self=this; return {id:p.id,name:p.name,sub:p.sub,bg:this.bgObj(p.images[0],'center 18%'),priceLabel:'a partir de '+this.brl(p.price),open:function(){ self.openProduct(p.id); }}; }\n  renderVals(){\n    var self=this, S=this.state, cur=this.curProd();\n    var chipBase='display:inline-block;padding:9px 16px;border-radius:999px;font-size:13px;font-family:Jost,sans-serif;cursor:pointer;letter-spacing:.02em;white-space:nowrap;';\n    var chipOn=chipBase+'background:var(--gold);color:#1a1206;border:1px solid var(--gold);font-weight:600;';\n    var chipOff=chipBase+'background:transparent;color:var(--muted);border:1px solid var(--line2);';\n    var sizeBase='padding:11px 14px;border-radius:10px;font-size:14px;font-family:Jost,sans-serif;cursor:pointer;min-width:60px;text-align:center;';\n    var sizeOn=sizeBase+'background:var(--text);color:var(--bg);border:1px solid var(--text);font-weight:600;';\n    var sizeOff=sizeBase+'background:transparent;color:var(--text);border:1px solid var(--line2);';\n    var thumbBaseObj={width:'72px',height:'72px',borderRadius:'10px',overflow:'hidden',cursor:'pointer',backgroundColor:'#0d0a05',flex:'none',backgroundSize:'cover',backgroundPosition:'center 15%',backgroundRepeat:'no-repeat'};\n    var thumbObj=function(on,url){ var o=Object.assign({},thumbBaseObj,{backgroundImage:\"url('\"+url+\"')\"}); if(on){ o.outline='2px solid var(--gold)'; o.outlineOffset='1px'; o.border='0'; } else { o.border='1px solid var(--line)'; } return o; };\n\n    var cartCount=S.cart.reduce(function(a,it){return a+it.qty;},0);\n    var allCats=this.CATS.map(function(c){ var cnt=self.PRODUCTS.filter(function(p){return p.cat===c.slug;}).length; return {name:c.name,slug:c.slug,tag:cnt>0?(cnt+(cnt>1?' itens':' item')):'Em breve',open:function(){ self.openCategory(c.slug); }}; });\n    var imagensSubs=(this.CATS.find(function(c){return c.slug==='imagens';}).subs||[]).map(function(s){ return {label:s,open:function(){ self.openSub(s); }}; });\n    var otherCats=allCats.filter(function(c){return c.slug!=='imagens';});\n    var homeProducts=this.PRODUCTS.map(function(p){return self.card(p);});\n\n    var catObj=this.CATS.find(function(c){return c.slug===S.catSlug;})||this.CATS[0];\n    var catAll=this.PRODUCTS.filter(function(p){return p.cat===S.catSlug;});\n    var catFiltered=catAll.filter(function(p){return S.sub==='Todas'||p.sub===S.sub;});\n    var catProducts=catFiltered.map(function(p){return self.card(p);});\n    var subChipsShow=S.catSlug==='imagens';\n    var subChips = subChipsShow ? [{label:'Todas',sub:'Todas'}].concat((catObj.subs||[]).map(function(s){return {label:s,sub:s};})).map(function(o){ return {label:o.label,style:(S.sub===o.sub?chipOn:chipOff),pick:function(){ self.setState({sub:o.sub}); }}; }) : [];\n    var catHasProducts=catProducts.length>0;\n    var catEmptyMsg = catAll.length===0 ? 'Esta categoria estará disponível em breve.' : 'Nenhuma peça nesta linha por enquanto.';\n\n    var prod=null,gallery=[],sizeOpts=[],related=[];\n    if(cur){\n      var mainImage=cur.images[S.gIndex]||cur.images[0];\n      gallery=cur.images.map(function(src,i){ return {style:thumbObj(i===S.gIndex,src),pick:function(){ self.setState({gIndex:i}); }}; });\n      sizeOpts=cur.sizes.map(function(s){ return {label:s,style:(s===S.selSize?sizeOn:sizeOff),pick:function(){ self.setState({selSize:s}); }}; });\n      related=this.PRODUCTS.filter(function(p){return p.id!==cur.id;}).slice(0,3).map(function(p){return self.card(p);});\n      prod={id:cur.id,name:cur.name,sub:cur.sub,tagline:cur.tagline,mainBg:this.bgObj(mainImage,'center','contain'),priceLabel:this.brl(cur.price),note:cur.note||'',obs:cur.obs||'',descParas:cur.desc,specs:cur.specs,subOpen:function(){ self.openSub(cur.sub); }};\n    }\n    var fr=S.frete;\n    var cartLines=S.cart.map(function(it,idx){ var p=self.PRODUCTS.find(function(x){return x.id===it.id;}); return {name:p.name,size:it.size,bg:self.bgObj(p.images[0],'center 18%'),qty:it.qty,lineLabel:'a partir de '+self.brl(p.price*it.qty),inc:function(){ self.cartInc(idx); },dec:function(){ self.cartDec(idx); },remove:function(){ self.cartRemove(idx); }}; });\n    var subtotal=S.cart.reduce(function(a,it){ var p=self.PRODUCTS.find(function(x){return x.id===it.id;}); return a+p.price*it.qty; },0);\n\n    return {\n      showHome:S.screen==='home', showCat:S.screen==='category', showProd:S.screen==='product', showCart:S.screen==='cart',\n      goHome:function(){ self.goHome(); }, goContato:function(){ self.goContato(); }, openImagens:function(){ self.openCategory('imagens'); },\n      toggleMenu:function(){ self.setState({menuOpen:!S.menuOpen}); }, menuOpen:S.menuOpen,\n      toggleTheme:function(){ self.toggleTheme(); }, goCart:function(){ self.goCart(); },\n      cartCount:cartCount, cartCountShow:cartCount>0,\n      whatsHref:this.waHref('Olá! Vim pelo site da Mr.Brant e gostaria de mais informações.'),\n      homeProducts:homeProducts, imagensSubs:imagensSubs, allCats:allCats, otherCatsA:otherCats.slice(0,5), otherCatsB:otherCats.slice(5),\n      heroFeat:{bg:this.bgObj(this.PRODUCTS[2].images[0],'center 12%'),open:function(){ self.openProduct('maria-padilha-almas'); }},\n      aboutBg:this.bgObj(this.PRODUCTS[1].images[0],'center 22%'),\n      catName:catObj.name, subChips:subChips, subChipsShow:subChipsShow, catProducts:catProducts, catHasProducts:catHasProducts, catEmpty:!catHasProducts, catEmptyMsg:catEmptyMsg,\n      prod:prod, gallery:gallery, sizeOpts:sizeOpts, qty:S.qty,\n      incQty:function(){ self.setState({qty:Math.min(99,S.qty+1)}); }, decQty:function(){ self.setState({qty:Math.max(1,S.qty-1)}); },\n      addToCart:function(){ self.addToCart(); }, buyNow:function(){ self.buyNowCurrent(); },\n      cepVal:S.cep, onCep:function(e){ self.onCep(e); }, calcFrete:function(){ self.calcFrete(); },\n      freteOk:!!(fr&&fr.ok), freteErr:!!(fr&&fr.err), fretePac:fr&&fr.pac, freteSedex:fr&&fr.sedex,\n      related:related,\n      cartLines:cartLines, cartEmpty:S.cart.length===0, cartHas:S.cart.length>0, subtotalLabel:this.brl(subtotal), finalizeCart:function(){ self.finalizeCart(); },\n      toast:S.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Mr.Brant.dc"}
